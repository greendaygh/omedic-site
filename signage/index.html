SLIDE <span id="signage-counter" class="text-lg">01 / 05</span> </p> </div> </div> </div> </section> <div id="signage-meta" class="hidden" data-meta="[{&#34;campaign&#34;:&#34;약침의 효능 - 매선의 효능&#34;,&#34;headline&#34;:&#34;자연이 준 가장 강력한 재생 에너지.&#34;,&#34;description&#34;:&#34;정제된 약침액의 영롱한 흐름이 피부 깊은 곳의 재생 리듬을 깨웁니다.&#34;},{&#34;campaign&#34;:&#34;매선의 효능&#34;,&#34;headline&#34;:&#34;즉각 리프팅과 선명한 윤곽 개선&#34;,&#34;description&#34;:&#34;처진 피부 조직을 직접 끌어올려 안면 라인을 즉시 정돈하고 입체감을 살립니다.&#34;},{&#34;campaign&#34;:&#34;매선의 효능&#34;,&#34;headline&#34;:&#34;미세 순환 활성으로 맑아지는 피부 톤&#34;,&#34;description&#34;:&#34;시술 부위의 혈류 흐름을 촉진해 칙칙함을 줄이고 피부 결을 촘촘하게 개선합니다.&#34;},{&#34;campaign&#34;:&#34;매선의 효능&#34;,&#34;headline&#34;:&#34;피부 톤·결 개선부터 장기 탄력 유지까지&#34;,&#34;description&#34;:&#34;콜라겐과 엘라스틴 생성을 유도해 시간이 지나도 탄력감이 유지되는 기반을 만듭니다.&#34;},{&#34;campaign&#34;:&#34;매선의 효능&#34;,&#34;headline&#34;:&#34;볼륨 형성과 타이트닝을 동시에&#34;,&#34;description&#34;:&#34;꺼진 부위의 자연스러운 볼륨을 채우고 탄탄한 네트워크 구조로 리프팅을 오래 유지합니다.&#34;}]"></div> <script>
    (() => {
      const slides = Array.from(document.querySelectorAll('.signage-slide'));
      const counter = document.getElementById('signage-counter');
      const campaign = document.getElementById('signage-campaign');
      const headline = document.getElementById('signage-headline');
      const description = document.getElementById('signage-description');
      const metaScript = document.getElementById('signage-meta');
      const metaRaw = metaScript?.getAttribute('data-meta') || '[]';
      const meta = JSON.parse(metaRaw);

      if (slides.length <= 1) return;

      let current = 0;
      const total = slides.length;

      const applySlide = (target) => {
        current = target;
        slides.forEach((slide, index) => {
          const active = index === target;
          slide.classList.toggle('opacity-100', active);
          slide.classList.toggle('opacity-0', !active);
          slide.setAttribute('aria-hidden', active ? 'false' : 'true');
        });

        if (counter) {
          counter.textContent = `${String(target + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
        }
        if (campaign) campaign.textContent = meta[target]?.campaign || '';
        if (headline) headline.textContent = meta[target]?.headline || '';
        if (description) description.textContent = meta[target]?.description || '';
      };

      applySlide(0);
      const existingInterval = window.__signageSlideIntervalId;
      if (existingInterval) {
        window.clearInterval(existingInterval);
      }

      window.__signageSlideIntervalId = window.setInterval(() => {
        applySlide((current + 1) % total);
      }, 6000);
    })();
  </script>  </main> <footer class="bg-brown-700 text-beige-100 py-8"> <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8"> <div class="flex flex-col md:flex-row items-center justify-between gap-4 text-sm"> <div class="text-center md:text-left"> <p class="font-semibold text-beige-50">이응한의원</p> <p class="text-beige-200 mt-1">세종 남세종로 458 아리랑빌딩 5층</p> </div> <p class="text-beige-200">&copy; 2026 이응한의원. All rights reserved.</p> </div> </div> </footer> </body></html>
